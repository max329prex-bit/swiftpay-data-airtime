name: Deploy Supabase Functions

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: tljnhlhzyntotadxoypz

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase functions deploy

      - name: Set Supabase Secrets
        run: |
          supabase secrets set --project-ref $SUPABASE_PROJECT_ID \
            GMAIL_ADDRESS="${{ secrets.GMAIL_ADDRESS }}" \
            GMAIL_APP_PASSWORD="${{ secrets.GMAIL_APP_PASSWORD }}" \
            OPAY_SENDER="${{ secrets.OPAY_SENDER }}"

      - name: Repair migration history
        if: github.ref == 'refs/heads/main'
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID
          # Remote has versions that were renamed locally; mark them reverted.
          supabase migration repair --status reverted 20260506103135 20260506103524 20260507220520 20260511232320 20260626225207 || true
          # Mark every local migration as applied so only new migrations are pushed.
          for f in supabase/migrations/*.sql; do
            v=$(basename "$f" | cut -d'_' -f1)
            supabase migration repair --status applied "$v" || true
          done

      - name: Apply Migrations (dev only)
        if: github.ref == 'refs/heads/main'
        run: |
          supabase db push --linked
