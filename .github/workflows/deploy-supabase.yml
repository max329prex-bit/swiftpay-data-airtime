name: Deploy Supabase

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref tljnhlhzyntotadxoypz
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply database migrations
        continue-on-error: true
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy all edge functions
        run: |
          supabase functions deploy vtu-purchase --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy aidapay-webhook --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy get-packages --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy get-electricity-providers --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy transaction-recovery --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy provider-health --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy sync-packages --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy korapay-topup --project-ref tljnhlhzyntotadxoypz
          supabase functions deploy korapay-webhook --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy verify-deposit --project-ref tljnhlhzyntotadxoypz
          supabase functions deploy treasury-manager --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy treasury-reconcile --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy swift-chat --project-ref tljnhlhzyntotadxoypz
          supabase functions deploy chat --project-ref tljnhlhzyntotadxoypz
          supabase functions deploy manual-fund --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
          supabase functions deploy admin-otp --project-ref tljnhlhzyntotadxoypz --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
