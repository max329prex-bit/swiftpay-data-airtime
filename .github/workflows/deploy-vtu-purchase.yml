name: Deploy vtu-purchase Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/vtu-purchase/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy vtu-purchase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref tljnhlhzyntotadxoypz
          supabase functions deploy vtu-purchase
