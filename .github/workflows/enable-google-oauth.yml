name: Enable Supabase Google OAuth

on:
  workflow_dispatch:

jobs:
  enable-google:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Google provider in Supabase
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "external_google_enabled": true,
              "external_google_client_id": "${{ secrets.GOOGLE_CLIENT_ID }}",
              "external_google_secret": "${{ secrets.GOOGLE_CLIENT_SECRET }}",
              "site_url": "https://blitz.com.ng",
              "uri_allow_list": "https://blitz.com.ng/app,https://www.blitz.com.ng/app"
            }' \
            https://api.supabase.com/v1/projects/tljnhlhzyntotadxoypz/config/auth | jq .
